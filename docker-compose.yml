services:

  postgres:
    image: postgres:17-alpine
    container_name: velora-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${APP_TIMEZONE}

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - velora_db:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - velora

  redis:
    image: redis:8-alpine
    container_name: velora-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - velora_redis:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - velora

  minio:
    image: minio/minio:latest
    container_name: velora-minio
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}

    command: server /data --console-address ":9001"

    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

    volumes:
      - velora_storage:/data

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - velora

  mailpit:
    image: axllent/mailpit:latest
    container_name: velora-mailpit
    restart: unless-stopped

    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

    networks:
      - velora

  ollama:
    image: ollama/ollama:latest
    container_name: velora-ollama
    restart: unless-stopped

    ports:
      - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      - velora_ollama:/root/.ollama

    networks:
      - velora

networks:
  velora:
    driver: bridge

volumes:
  velora_db:
  velora_redis:
  velora_storage:
  velora_ollama:
